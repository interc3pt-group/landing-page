name: Validate Commit Messages

on:
  pull_request:
  push:
    branches:
      - develop
      - staging
      - master
      - main

jobs:
  commitlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Verify commit messages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FROM="${{ github.event.pull_request.base.sha }}"
            TO="${{ github.event.pull_request.head.sha }}"
          else
            FROM="${{ github.event.before }}"
            TO="${{ github.sha }}"
          fi
          # On the first push to a branch the "before" sha is all zeros,
          # so fall back to linting only the latest commit.
          if echo "$FROM" | grep -qE '^0+$'; then
            bun run lint:commit -- --last
          else
            bun run lint:commit -- --from "$FROM" --to "$TO"
          fi
